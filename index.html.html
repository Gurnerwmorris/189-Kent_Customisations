// ─── HELPERS ────────────────────────────────────────────────────────────────
function pd(s){ return s ? new Date(s) : null; }
function df(s){ var d=pd(s); if(!d) return null; return Math.round((d-TODAY)/86400000); }
function fmt(s){
  if(!s) return "—";
  return pd(s).toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"});
}
function fmtP(p){ return p ? "$"+(p/1e6).toFixed(2)+"M" : "—"; }
function bicCol(b){ return BIC_COL[b]||"#888"; }

function getStage(u){
  if(u.qsEst)        return {label:"QS Estimate Issued",         pct:65, color:"#4caf82"};
  if(u.cad)          return {label:"CAD Plans Issued",            pct:50, color:"#4caf82"};
  if(u.feasibility)  return {label:"Feasibility Complete",        pct:35, color:"#c9a84c"};
  if(u.sketch)       return {label:"Sketch Issued",               pct:25, color:"#c9a84c"};
  if(u.brief && pd(u.brief)<=TODAY) return {label:"Brief Due — Sketch Pending", pct:10, color:"#e06060"};
  if(u.brief)        return {label:"Brief Pending",               pct:5,  color:"#555"};
  return               {label:"Not Started",                      pct:0,  color:"#7a736a"};
}

// ─── MINI COMPONENTS ────────────────────────────────────────────────────────
function BicBadge(props){
  if(!props.bic) return h("span",{style:{color:"#aaa49c",fontSize:11}},"—");
  var c=bicCol(props.bic);
  return h("span",{style:{display:"inline-block",padding:"2px 8px",borderRadius:2,fontSize:11,fontWeight:600,
    background:c+"20",color:c,border:"1px solid "+c+"40",letterSpacing:"0.04em"}},props.bic);
}
function SBadge(props){
  var ex=props.s==="EXCHANGED";
  return h("span",{style:{display:"inline-block",padding:"2px 7px",borderRadius:2,fontSize:10,
    letterSpacing:"0.06em",textTransform:"uppercase",fontWeight:500,
    background:ex?"#e8f5ee":"#fdf5e0",color:ex?"#2a7a4a":"#b07d10",
    border:"1px solid "+(ex?"#a0d8b8":"#e8d080")}},props.s);
}
function YNBadge(props){
  var v=props.v;
  if(!v||v==="NO"||v==="—") return h("span",{style:{color:"#ccc7be",fontSize:11}},"—");
  if(v==="YES") return h("span",{style:{color:"#2a7a4a",fontSize:13}},"✓");
  return h("span",{style:{display:"inline-block",padding:"1px 5px",borderRadius:2,
    fontSize:9,background:"#fdf5e0",color:"#b07d10",border:"1px solid #e8d080",
    whiteSpace:"nowrap"}},v);
}
function DBadge(props){
  var d=props.d;
  if(d===null||d===undefined) return h("span",{style:{color:"#aaa49c",fontSize:10}},"—");
  var ov=d<0,ur=d>=0&&d<=14;
  var c=ov?"#c0392b":ur?"#b07d10":"#2a7a4a";
  var bg=ov?"#fdeaea":ur?"#fdf5e0":"#e8f5ee";
  var bd=ov?"#f0b8b8":ur?"#e8d080":"#a0d8b8";
  var lbl=ov?Math.abs(d)+"d overdue":d===0?"today":d+"d";
  return h("span",{style:{display:"inline-block",padding:"2px 7px",borderRadius:2,fontSize:10,background:bg,color:c,border:"1px solid "+bd}},lbl);
}
function PBar(props){
  var p=props.pct,c=props.color||"#c9a84c",lbl=props.label;
  return h("div",null,
    h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}},
      h("span",{style:{fontSize:10,color:"#555",letterSpacing:"0.04em"}},lbl),
      h("span",{style:{fontSize:10,color:c}},p+"%")
    ),
    h("div",{style:{height:3,background:"#ebe7e0",borderRadius:2}},
      h("div",{style:{height:"100%",width:p+"%",background:c,borderRadius:2,transition:"width 0.5s"}})
    )
  );
}

function UnitModal(props){
  var u=props.unit, close=props.onClose;
  var stage=getStage(u);

  // Build milestone rows
  var rows = ALL_MILESTONES.map(function(m){
    var val = u[m.key];
    var isDate = !m.isBool;
    var done = m.isBool ? !!val : (val && pd(val)<=TODAY);
    var dateVal = isDate ? val : null;
    var days = dateVal ? df(dateVal) : null;
    var relevant = isDate ? !!val : (m.isBool && (u.bespoke || m.group==="design"));
    return {m:m, val:val, done:done, dateVal:dateVal, days:days, relevant:relevant};
  }).filter(function(r){ return r.relevant || r.dateVal || r.val; });

  // Mini timeline — horizontal dots
  var timelineSteps = [
    {l:"Brief",    done: !!u.brief && pd(u.brief)<=TODAY},
    {l:"Sketch",   done: u.sketch},
    {l:"Feasibility", done: u.feasibility},
    {l:"CAD",      done: u.cad},
    {l:"QS Est",   done: u.qsEst},
    {l:"Design End", done: u.designEnd && pd(u.designEnd)<=TODAY},
    {l:"QS Cert",  done: u.qsCert && pd(u.qsCert)<=TODAY},
    {l:"DoV Issue",done: u.dovIssue && pd(u.dovIssue)<=TODAY},
    {l:"DoV Sign", done: u.dovDeadline && pd(u.dovDeadline)<=TODAY},
  ];
  var lastDone = -1;
  timelineSteps.forEach(function(s,i){ if(s.done) lastDone=i; });

  // Gantt section — date-based milestones only
  var dateMilestones = [
    {key:"brief",       label:"Written Brief",      date:u.brief,       color:"#c9a84c"},
    {key:"designEnd",   label:"Design End",          date:u.designEnd,   color:"#c9a84c"},
    {key:"qsCert",      label:"QS Certification",    date:u.qsCert,      color:"#b06cd0"},
    {key:"dovIssue",    label:"DoV Issue",           date:u.dovIssue,    color:"#4caf82"},
    {key:"dovDeadline", label:"DoV Deadline",        date:u.dovDeadline, color:"#4caf82"},
    {key:"hickory",     label:"Instructed Hickory",  date:u.hickory,     color:"#4c9af0"},
    {key:"modApproval", label:"Mod Approval",        date:u.modApproval, color:"#888"},
  ].filter(function(m){ return !!m.date; });

  var ganttEl = null;
  if(dateMilestones.length > 0){
    // ── Date range for timeline ───────────────────────────────────────────
    var MLABEL_W = 140;
    var validDates = dateMilestones.filter(function(m){ return !!m.date; });
    var allD = validDates.map(function(m){ return new Date(m.date); });
    allD.push(TODAY);
    if(allD.length < 2) allD.push(new Date(TODAY.getTime() + 90*86400000));
    var minD = new Date(Math.min.apply(null,allD)); minD.setDate(minD.getDate()-14);
    var maxD = new Date(Math.max.apply(null,allD)); maxD.setDate(maxD.getDate()+30);
    var totalDays = Math.max(1, Math.round((maxD-minD)/86400000));
    var pctOf = function(d){ return !d ? 0 : Math.max(0,Math.min(100, Math.round(((new Date(d)-minD)/86400000)/totalDays*100))); };
    var todayPct = Math.max(0,Math.min(100, Math.round((TODAY-minD)/86400000)/totalDays*100));

    // Month labels — use pct positioning (consistent with pctOf)
    var months = [];
    var mc = new Date(minD.getFullYear(), minD.getMonth(), 1);
    while(mc <= maxD){
      var mpct = Math.round((mc-minD)/86400000)/totalDays*100;
      if(mpct >= 0 && mpct <= 105){
        months.push({ label: mc.toLocaleDateString("en-AU",{month:"short", year:"2-digit"}), pct: mpct });
      }
      mc = new Date(mc.getFullYear(), mc.getMonth()+1, 1);
    }

    ganttEl = h("div",{style:{marginTop:20}},
      h("div",{style:{fontSize:10,color:"#7a736a",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}},
        "Milestone Timeline"),
      // Month header row
      h("div",{style:{position:"relative",height:24,marginLeft:MLABEL_W+"px",
        borderBottom:"1px solid #ebe7e0",marginBottom:2,overflowX:"visible"}},
        months.map(function(m,i){
          // Only render every 2nd month label to avoid crowding
          if(i % 2 !== 0) return null;
          return h("div",{key:i,style:{position:"absolute",left:m.pct+"%",
            fontSize:9,color:"#bbb5ad",letterSpacing:"0.04em",textTransform:"uppercase",
            whiteSpace:"nowrap",bottom:4,transform:"translateX(-50%)"}},m.label);
        }),
        h("div",{style:{position:"absolute",left:todayPct+"%",top:0,bottom:0,
          width:1,background:"#e0606055"}})
      ),
      // Milestone rows
      h("div",{style:{display:"flex",flexDirection:"column"}},
        dateMilestones.map(function(m){
          if(!m.date) return null;
          var p = pctOf(m.date);
          var isPast = pd(m.date) <= TODAY;
          var daysVal = df(m.date);
          var dotColor = isPast ? "#bbb5ad" : m.color;
          return h("div",{key:m.key,style:{display:"flex",alignItems:"stretch",
            borderBottom:"1px solid #f7f5f2",marginBottom:2}},
            // Label
            h("div",{style:{width:MLABEL_W+"px",flexShrink:0,fontSize:11,
              color:isPast?"#aaa49c":"#3a3530",
              paddingRight:12,textAlign:"right",
              display:"flex",alignItems:"center",justifyContent:"flex-end",
              lineHeight:1.3}},
              m.label
            ),
            // Chart
            h("div",{style:{flex:1,display:"flex",flexDirection:"column",minWidth:0}},
              // TOP: date
              h("div",{style:{height:15,position:"relative",overflowX:"hidden"}},
                h("div",{style:{position:"absolute",left:p+"%",bottom:1,
                  transform:"translateX(-50%)",
                  fontSize:9,fontWeight:500,
                  color:isPast?"#aaa49c":m.color,
                  whiteSpace:"nowrap"}},
                  fmt(m.date)
                )
              ),
              // MIDDLE: track + dot + today line
              h("div",{style:{height:14,position:"relative"}},
                h("div",{style:{position:"absolute",left:todayPct+"%",top:0,bottom:0,
                  width:1,background:"#e0606033"}}),
                h("div",{style:{position:"absolute",top:"50%",left:0,
                  right:(100-p)+"%",height:1,
                  background:isPast?"#d0cbc2":"#e8e3da",
                  transform:"translateY(-50%)"}}),
                h("div",{style:{position:"absolute",
                  left:p+"%",top:"50%",
                  transform:"translate(-50%,-50%)",
                  width:10,height:10,borderRadius:"50%",
                  background:isPast?"#d5d0c8":dotColor,
                  border:"2px solid "+(isPast?"#bbb5ad":dotColor),
                  boxShadow:isPast?"none":"0 0 4px "+dotColor+"55",
                  zIndex:2}})
              ),
              // BOTTOM: days badge
              h("div",{style:{height:18,position:"relative"}},
                !isPast && daysVal !== null && h("div",{style:{position:"absolute",
                  left:p+"%",top:2,transform:"translateX(-50%)"}},
                  h(DBadge,{d:daysVal})
                )
              )
            )
          );
        })
      ),
      // Today label
      h("div",{style:{position:"relative",marginLeft:MLABEL_W+"px",height:14,marginTop:2}},
        h("div",{style:{position:"absolute",left:todayPct+"%",
          transform:"translateX(-50%)",fontSize:9,color:"#e06060",whiteSpace:"nowrap"}},
          "today")
      )
    );
  }


  return h("div",{className:"modal-overlay",onClick:function(e){if(e.target===e.currentTarget)close();}},
    h("div",{className:"modal-box"},
      // Header
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}},
        h("div",null,
          h("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#c9a84c"}},u.unit),
          h("div",{style:{fontSize:13,color:"#888",marginTop:2}},u.name),
          h("div",{style:{display:"flex",gap:8,marginTop:8,alignItems:"center"}},
            h(SBadge,{s:u.status}),
            u.bespoke && h("span",{style:{display:"inline-block",padding:"2px 8px",borderRadius:2,fontSize:10,
              background:"#f5eefa",color:"#8a40b0",border:"1px solid #d4a8f0",letterSpacing:"0.06em",textTransform:"uppercase"}},"Bespoke"),
            h(BicBadge,{bic:u.bic})

        h("button",{onClick:close,style:{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:26,lineHeight:1}},"×")

      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}},
        [{l:"Agent",v:u.agent},{l:"Price",v:fmtP(u.price)},{l:"Exchanged",v:fmt(u.exchanged)},{l:"Spec",v:u.spec||"—"},{l:"Comms Lead",v:u.lead||"—"}].map(function(f){
          return h("div",{key:f.l,style:{background:"#ffffff",borderRadius:3,padding:"10px 12px"}},
            h("div",{style:{fontSize:9,color:"#444",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:3}},f.l),
            h("div",{style:{fontSize:12,color:"#c8c0b0"}},f.v)
          );
        })
      ),

      // BIC + Next Steps
      h("div",{style:{background:"#ffffff",border:"1px solid #c9a84c22",borderRadius:3,padding:16,marginBottom:20}},
        h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},
          h("span",{style:{fontSize:10,color:"#444",letterSpacing:"0.1em",textTransform:"uppercase"}},"Ball in Court"),

        h("div",{style:{fontSize:10,color:"#444",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}},"Next Steps"),

                  h("span",{style:{fontSize:12,fontWeight:500,color:"#2a2520"}},phase.phase)
                ),
                h("div",{style:{fontSize:9,color:phase.color,letterSpacing:"0.07em",
                  textTransform:"uppercase",paddingLeft:14}},phase.steps)
              ),
              h("span",{style:{fontSize:12,color:phase.color+"99",lineHeight:1,
                display:"inline-block",transform:exp?"rotate(180deg)":"rotate(0deg)",
                transition:"transform 0.2s"}},"▾")
            ),
            exp && h("div",{style:{borderTop:"1px solid "+phase.color+"22"}},
              phase.milestones.map(function(m){
                return h("div",{key:m.n,
                  style:{padding:"7px 12px",borderBottom:"1px solid #f5f3ef",
                    borderLeft:"3px solid "+(m.contract?phase.color:phase.color+"44"),
                    background:m.contract?"#ffffff":"#fdfcfb"}},
                  h("div",{style:{display:"flex",alignItems:"baseline",gap:6,marginBottom:2}},
                    h("span",{style:{fontSize:10,fontWeight:600,color:phase.color,minWidth:24,flexShrink:0}},m.n),
                    h("span",{style:{fontSize:11,color:"#2a2520",fontWeight:m.contract?500:400,flex:1}},m.label),
                    h("span",{style:{fontSize:9,color:"#bbb5ad",flexShrink:0}},m.clause)
                  ),
                  h("div",{style:{paddingLeft:30}},
                    h("div",{style:{fontSize:10,color:"#6a6058",lineHeight:1.5,marginBottom:2}},m.desc),
                    h("div",{style:{fontSize:9,color:phase.color+"99",letterSpacing:"0.03em"}},"⏱ "+m.timing)
                  )
                );
              })
            )
          );
        })
      ),
      // Symbol legend bar
      h("div",{style:{display:"flex",gap:16,flexWrap:"wrap",alignItems:"center",
        padding:"7px 12px",background:"#f9f8f6",borderRadius:3,border:"1px solid #ebe7e0"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#4a4540"}},
          h("div",{style:{width:1,height:13,background:"#888"}}),
          h("span",null,"Contractual milestone")),
        h("div",{style:{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#4a4540"}},
          h("div",{style:{width:9,height:9,background:"#888",transform:"rotate(45deg)",flexShrink:0}}),
          h("span",null,"Tracking step — complete")),
        h("div",{style:{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#4a4540"}},
          h("div",{style:{width:9,height:9,border:"2px solid #bbb5ad",transform:"rotate(45deg)",flexShrink:0,background:"transparent"}}),
          h("span",null,"Tracking step — pending")),
        h("div",{style:{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#4a4540"}},
          h("div",{style:{width:2,height:13,background:"#e06060"}}),
          h("span",null,"Today")),
        h("div",{style:{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#4a4540"}},
          h("button",{style:{background:"#f0ede8",border:"1px solid #d5d0c8",color:"#7a736a",
            borderRadius:2,width:18,height:18,fontSize:10,cursor:"default",lineHeight:1}},"⊕"),
          h("span",null,"Full unit detail"))
      )
    ),

    h("div",{style:{overflowX:"auto"}},
      h("div",{style:{minWidth:(W+LABEL_W+8)+"px"}},

        // Month row
        h("div",{style:{marginLeft:LABEL_W+"px",position:"relative",height:20,
          borderBottom:"1px solid #ebe7e0",marginBottom:8}},
          months.map(function(m,i){
            return h("div",{key:i,style:{position:"absolute",left:m.x+"px",fontSize:9,
              color:"#2e2e2e",letterSpacing:"0.06em",textTransform:"uppercase",whiteSpace:"nowrap"}},m.label);
          }),
          // Today tick
          h("div",{style:{position:"absolute",left:todayX+"px",top:0,height:"100%",
            width:1,background:"#e0606066"}})
        ),

        // Unit rows
        ganttUnits.map(function(u){
          var stage = getStage(u);

          // Which yellow steps are done for this unit
          var yellowDone = {};
          YELLOW_STEPS.forEach(function(ys){ yellowDone[ys.key] = !!u[ys.key]; });

          // Collect contractual milestone x positions
          var contractX = {};
          CONTRACT_STEPS.forEach(function(cs){
            var x = xp(u[cs.key]);
            if(x !== null) contractX[cs.key] = x;
          });

          // The "spine" bar — from exchanged to last milestone
          var spineStart = xp(u.exchanged || u.brief);
          var lastDate = null;
          CONTRACT_STEPS.forEach(function(cs){
            if(u[cs.key] && u[cs.key]!=="2028-06-30" && (!lastDate || new Date(u[cs.key])>new Date(lastDate)))
              lastDate = u[cs.key];
          });
          var spineEnd = lastDate ? xp(lastDate) : null;

          // Actual progress spine (up to today or brief, whichever is less)
          var actStart = xp(u.exchanged || u.brief);
          var actEnd = u.sketch
            ? (u.brief && new Date(u.brief)<TODAY ? xp(u.brief) : todayX)
            : null;

          return h("div",{key:u.unit,
            style:{display:"flex",alignItems:"center",marginBottom:4,
              borderBottom:"1px solid #111",paddingBottom:4}},

            // LEFT LABEL
            h("div",{style:{width:LABEL_W+"px",flexShrink:0,paddingRight:10,
              display:"flex",alignItems:"center",gap:6}},
              h("button",{onClick:function(){onOpen(u);},
                title:"Full detail",
                style:{background:"#f0ede8",border:"1px solid #e0dbd2",color:"#6a6058",
                  borderRadius:2,cursor:"pointer",width:22,height:22,display:"flex",
                  alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}},
                "⊕"),
              h("div",{style:{flex:1,minWidth:0}},
                // Unit + name
                h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:2}},
                  h("span",{style:{fontSize:12,color:"#c9a84c",fontWeight:500,
                    letterSpacing:"0.03em",flexShrink:0}},u.unit),
                  h(BicBadge,{bic:u.bic})
                ),
                h("div",{style:{fontSize:9,color:"#7a736a",overflow:"hidden",
                  textOverflow:"ellipsis",whiteSpace:"nowrap"}},u.name),
                // Stage
                h("div",{style:{fontSize:9,color:stage.color,letterSpacing:"0.04em",marginTop:1}},
                  stage.label)
              )
            ),

            // CHART AREA
            h("div",{style:{position:"relative",height:ROW_H+"px",flex:1}},

              // Today line
              h("div",{style:{position:"absolute",left:todayX+"px",top:0,bottom:0,
                width:1,background:"#e06060",opacity:0.5,zIndex:10}}),

              // Phase-coloured spine segments between contractual milestones
              (function(){
                var segments = [
                  { from:"brief", to:"designEnd",  color:"#4c9af0" },
                  { from:"designEnd", to:"qsCert",  color:"#b06cd0" },
                  { from:"qsCert", to:"dovIssue",   color:"#4caf82" },
                  { from:"dovIssue", to:"dovDeadline", color:"#4caf82" },
                  { from:"dovDeadline", to:"hickory",  color:"#4ecece" },
                  { from:"hickory", to:"modApproval",  color:"#4ecece" },
                ];
                return segments.map(function(seg){
                  var x1 = contractX[seg.from], x2 = contractX[seg.to];
                  if(x1===undefined||x2===undefined) return null;
                  return h("div",{key:seg.from+seg.to,style:{position:"absolute",
                    left:x1+"px",width:(x2-x1)+"px",
                    top:"24px",height:2,background:seg.color+"33",zIndex:1}});
                });
              })(),

              // Actual progress spine (phase colour of design)
              actStart!==null && actEnd!==null && h("div",{
                style:{position:"absolute",
                  left:actStart+"px",
                  width:Math.max(actEnd-actStart,2)+"px",
                  top:"24px",height:2,background:"#4c9af066",zIndex:2}}),

              // ── CONTRACTUAL MILESTONE LINES (white verticals) ──
              CONTRACT_STEPS.map(function(cs){
                var x = contractX[cs.key];
                if(x===undefined) return null;
                var isPast = new Date(u[cs.key]) <= TODAY;
                var days = Math.round((new Date(u[cs.key])-TODAY)/86400000);
                var dLabel = isPast ? (Math.abs(days)+"d ago") : (days+"d");
                var lineColor = isPast ? "#2e2e2e" : "#c8c0b044";
                return h("div",{key:cs.key,
                  title:cs.label+": "+fmt2(u[cs.key])+" ("+dLabel+")",
                  style:{position:"absolute",left:x+"px",top:4,zIndex:3,
                    display:"flex",flexDirection:"column",alignItems:"center"}},
                  // Vertical tick line
                  h("div",{style:{width:1,height:44,background:isPast?"#252525":cs.color+"99"}}),
                  // Date label above
                  h("div",{style:{position:"absolute",top:0,left:2,
                    fontSize:7,color:isPast?"#2e2e2e":cs.color+"cc",whiteSpace:"nowrap",
                    letterSpacing:"0.03em"}},fmt2(u[cs.key])),
                  // Label below
                  h("div",{style:{position:"absolute",bottom:0,left:2,
                    fontSize:7,color:isPast?"#252525":cs.color+"88",whiteSpace:"nowrap",
                    maxWidth:50,overflow:"hidden",textOverflow:"ellipsis"}},cs.short)
                );
              }),

              // ── YELLOW TRACKING STEPS (diamonds between milestones) ──
              (function(){
                // Place yellow step diamonds between their surrounding contractual milestones
                // Group by which phase they belong to
                // Phase 1 (brief→designEnd): sketch, feasibility, cad, qsEst, confirm
                // Phase 2 (designEnd→qsCert): builder, commercial
                // Phase 3 (qsCert→dovIssue): dovApproval

                var phases = [
                  { steps:["sketch","feasibility","cad","qsEst","confirm"], from:"brief", to:"designEnd" },
                  { steps:["builder","commercial"], from:"designEnd", to:"qsCert" },
                  { steps:["dovApproval"], from:"qsCert", to:"dovIssue" },
                ];

                var diamonds = [];
                phases.forEach(function(phase){
                  var x1 = contractX[phase.from];
                  var x2 = contractX[phase.to];
                  if(x1===undefined && x2===undefined) return;
                  // Use today as fallback if no from
                  if(x1===undefined) x1 = todayX;
                  if(x2===undefined) x2 = x1 + 80;

                  var span = x2 - x1;
                  var visibleSteps = phase.steps.filter(function(sk){
                    // Always show sketch; others only for bespoke
                    return sk==="sketch" || u.bespoke;
                  });
                  if(!visibleSteps.length) return;

                  visibleSteps.forEach(function(sk,idx){
                    var pct = (idx+1)/(visibleSteps.length+1);
                    var dx = x1 + span*pct;
                    var done = !!u[sk];
                    var ys = YELLOW_STEPS.find(function(y){ return y.key===sk; });
                    var lbl = ys ? ys.label.replace(/^\d+\.\d+\s/,"") : sk;
                    var dc = ys ? ys.color : "#888";
                    diamonds.push(h("div",{key:sk,
                      title:(done?"✓ ":"Pending: ")+lbl,
                      style:{position:"absolute",
                        left:(dx-6)+"px",top:"17px",
                        width:12,height:12,
                        background:done?dc:"transparent",
                        border:"2px solid "+(done?dc:dc+"55"),
                        transform:"rotate(45deg)",
                        zIndex:5,
                        boxShadow:done?"0 0 5px "+dc+"66":"none",
                        transition:"all 0.2s",
                        cursor:"default"}}));
                  });
                });
                return diamonds;
              })()

            ) // end chart area
          ); // end unit row
        }),

        // Today label
        h("div",{style:{marginLeft:LABEL_W+"px",position:"relative",height:14,marginTop:4}},
          h("div",{style:{position:"absolute",left:todayX+"px",transform:"translateX(-50%)",
            fontSize:9,color:"#e06060",letterSpacing:"0.04em"}},"▲ today")
        )

      ) // end min-width div
    ) // end overflow
  ); // end card
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App(){
  var stateTab=useState("overview"); var tab=stateTab[0],setTab=stateTab[1];
  var stateModal=useState(null); var modalUnit=stateModal[0],setModalUnit=stateModal[1];

  // Close modal on Escape
  useEffect(function(){
    function onKey(e){ if(e.key==="Escape") setModalUnit(null); }
    window.addEventListener("keydown",onKey);
    return function(){ window.removeEventListener("keydown",onKey); };
  },[]);

  var exchanged=UNITS.filter(function(u){return u.status==="EXCHANGED";});
  var totalRev=exchanged.reduce(function(s,u){return s+(u.price||0);},0);
  var sketchDone=UNITS.filter(function(u){return u.sketch;}).length;
  var sketchPending=UNITS.filter(function(u){return u.bespoke&&!u.sketch&&u.status==="EXCHANGED";}).length;

  return h("div",{style:{background:"#f5f3ef",minHeight:"100vh",color:"#2a2520"}},
    // Header
    h("div",{style:{borderBottom:"1px solid #e8e3da",background:"#ffffff",padding:"16px 28px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
      h("div",null,
        h("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#1a1714",letterSpacing:"0.02em"}},"189 Kent Street"),
        h("div",{style:{fontSize:10,color:"#7a736a",letterSpacing:"0.15em",textTransform:"uppercase",marginTop:1}},"Salus Place — Customisations Tracker")
      ),
      h("div",{style:{display:"flex",gap:18,alignItems:"center"}},
        [{l:"Sketches Issued",v:sketchDone+"/"+UNITS.length},
         {l:"Pending Sketches",v:sketchPending,red:sketchPending>0}
        ].map(function(k){
          return h("div",{key:k.l,style:{textAlign:"right"}},
            h("div",{style:{fontSize:9,color:"#7a736a",letterSpacing:"0.1em",textTransform:"uppercase"}},k.l),
            h("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:17,
              color:k.gold?"#c9a84c":k.red&&k.v>0?"#e06060":"#e8e0d0"}},k.v)
          );
        }),
        h("div",{style:{width:1,height:28,background:"#e8e3da"}}),
        h("div",{style:{textAlign:"right"}},
          h("div",{style:{fontSize:9,color:"#7a736a",letterSpacing:"0.1em",textTransform:"uppercase"}},"Today"),
          h("div",{style:{fontSize:11,color:"#666"}},TODAY.toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"}))
        )
      )
    ),
    // Tabs
    h("div",{style:{borderBottom:"1px solid #e8e3da",padding:"0 28px",display:"flex"}},
      [{k:"overview",l:"Overview"},{k:"units",l:"Units & Actions"},{k:"gantt",l:"Gantt Chart"}].map(function(t){
        var active=tab===t.k;
        return h("button",{key:t.k,
          onClick:function(){setTab(t.k);},
          style:{padding:"10px 20px",background:"none",border:"none",
            borderBottom:"2px solid "+(active?"#c9a84c":"transparent"),
            color:active?"#c9a84c":"#555",cursor:"pointer",
            fontFamily:"'DM Sans',sans-serif",fontSize:12,letterSpacing:"0.08em",
            textTransform:"uppercase",transition:"all 0.2s"}},t.l);
      })
    ),
    // Content
    h("div",{style:{padding:"18px 12px"}},
      tab==="overview" && h(OverviewTab,null),
      tab==="units"    && h(UnitsTab,{onOpen:setModalUnit}),
      tab==="gantt"    && h(GanttTab,{onOpen:setModalUnit})
    ),
    // Modal
    modalUnit && h(UnitModal,{unit:modalUnit,onClose:function(){setModalUnit(null);}})
  );
}

var root=ReactDOM.createRoot(document.getElementById("app"));
root.render(h(App,null));

})();
</script>
</body>
</html>
